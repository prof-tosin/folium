<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title id="pageTitle">Profile — Folium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAF6EF">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead">
  <div class="masthead__inner">
    <a href="index.html" class="brand">Foli<em>um</em></a>
    <div style="flex:1;"></div>
    <div class="masthead__actions">
      <a href="write.html" class="btn btn--ghost">Write</a>
      <button class="icon-btn" id="signOutBtn" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="container" style="max-width:760px;">
  <div id="profileHeader"><div class="spinner"></div></div>
  <div class="tabs" id="profileTabs" style="display:none;">
    <button class="active" data-tab="posts">Stories</button>
    <button data-tab="likes">Liked</button>
    <button data-tab="about">About</button>
  </div>
  <div id="profileBody"></div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit profile</h3>
    <div class="field"><label>Name</label><input type="text" id="editName"></div>
    <div class="field"><label>Bio</label><textarea id="editBio" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn--ghost" id="cancelEdit">Cancel</button>
      <button class="btn btn--primary" id="saveEdit">Save changes</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
