<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Folium — Writing worth reading</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAF6EF">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead">
  <div class="masthead__inner">
    <a href="index.html" class="brand">Foli<em>um</em></a>
    <div class="masthead__search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search stories, writers, tags…">
    </div>
    <div class="masthead__actions">
      <button class="icon-btn hidden" id="installBtn" title="Install Folium" onclick="triggerInstall()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v13m0 0-4-4m4 4 4-4"/><path d="M5 21h14"/></svg>
      </button>
      <a href="write.html" class="btn btn--ghost" style="display:flex;align-items:center;gap:6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Write
      </a>
      <a href="#" id="profileLink"><span id="navAvatar"></span></a>
    </div>
  </div>
</header>

<div class="layout">
  <main>
    <div class="tabs">
      <button class="active" data-tab="following">Following</button>
      <button data-tab="explore">Explore</button>
      <button data-tab="trending">Trending</button>
    </div>
    <div id="feedList"><div class="spinner"></div></div>
  </main>

  <aside class="sidebar">
    <div class="panel">
      <p class="panel__title">Who to follow</p>
      <div id="suggestList"><div class="spinner"></div></div>
    </div>
    <div class="panel">
      <p class="panel__title">Popular tags</p>
      <div id="tagCloud" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </aside>
</div>

<a href="write.html" class="fab" aria-label="Write a new story">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
</a>

<nav class="bottom-nav">
  <a href="index.html" class="active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>
  <a href="#" id="bottomSearch">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    Search
  </a>
  <a href="write.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Write
  </a>
  <a href="#" id="bottomProfile">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    Profile
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
</body>
</html>
